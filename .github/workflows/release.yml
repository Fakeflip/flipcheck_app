name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: ver
        run: echo "version=$(node -p "require('./v2/package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub release (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          TAG="v${VERSION}"
          git tag $TAG 2>/dev/null || true
          git push origin $TAG 2>/dev/null || true
          gh release view $TAG --repo ${{ github.repository }} 2>/dev/null || \
            gh release create $TAG \
              --repo ${{ github.repository }} \
              --title "$VERSION" \
              --notes "FLIPCHECK $VERSION" \
              --draft

  build-mac:
    needs: create-release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: v2

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (Mac)
        run: npm run build:mac

      - name: Upload Mac assets
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" \
            dist/FLIPCHECK-*.dmg \
            dist/FLIPCHECK-*.dmg.blockmap \
            dist/FLIPCHECK-*-mac.zip \
            dist/FLIPCHECK-*-mac.zip.blockmap \
            dist/latest-mac.yml \
            --repo ${{ github.repository }} --clobber

  build-win:
    needs: create-release
    runs-on: windows-latest
    defaults:
      run:
        working-directory: v2

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows)
        run: npm run build:win

      - name: Upload Windows assets
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $exe      = (Get-ChildItem dist\FLIPCHECK-Setup-*.exe | Where-Object Extension -eq '.exe').FullName
          $blockmap = "$exe.blockmap"
          $yml      = "dist\latest.yml"
          gh release upload "v$version" $exe $blockmap $yml --repo ${{ github.repository }} --clobber

  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" \
            --repo ${{ github.repository }} \
            --draft=false \
            --latest
